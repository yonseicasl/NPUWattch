#START_OF_DC_APPEND_SCRIPT
set clockPorts {i_CLK}
create_clock -name clk $clockPorts -period 5 -waveform {0 2.5}
set_clock_uncertainty 0.2 [get_clocks clk]
#END_OF_DC_APPEND_SCRIPT

#START_OF_PT_APPEND_SCRIPT
set inPorts [all_inputs]
set theClocks [get_clock]
set clockNames [get_attribute $theClocks full_name]
set inPortsNoClock [remove_from_collection $inPorts $clockNames]
set_switching_activity -static_probability 0.5 -toggle_rate 0.2 $inPortsNoClock -period 2
set_switching_activity -static_probability 0.5 -toggle_rate 0.2 -type registers -hierarchy -period 2
#END_OF_PT_APPEND_SCRIPT

STRC_TEMPERATURE 25